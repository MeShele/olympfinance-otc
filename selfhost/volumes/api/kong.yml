_format_version: "3.0"
_transform: true

# Kong declarative gateway для self-hosted Supabase (main).
# Отличие от install.sh-варианта: добавлен маршрут /functions/v1 → edge-runtime,
# которого у тенант-апплайанса нет (там функции живут в managed).

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1

  # ЯДРО МИГРАЦИИ: edge-функции локально. /functions/v1/<fn> → edge-runtime.
  - name: functions-v1
    url: http://functions:9000/
    routes:
      - name: functions-v1-route
        strip_path: true
        paths:
          - /functions/v1

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      # headers НЕ перечисляем: Kong тогда отражает Access-Control-Request-Headers
      # из preflight. Фиксированный список ломал supabase-js — он шлёт
      # content-profile/accept-profile/prefer/range/x-upsert (список растёт с версиями).
      exposed_headers:
        - Content-Range
        - Range
      credentials: true
      max_age: 3600
